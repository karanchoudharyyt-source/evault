<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>EVault — Real-Time EV Tracker for Courtyard Packs</title>
<meta name="description" content="Real-time expected value tracker for Courtyard.io mystery packs. See actual cash after buyback fees — data Pulld doesn't show."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#050508;
  --bg1:#08080e;
  --bg2:#0c0c16;
  --bg3:#10101e;
  --border:#16162a;
  --border2:#1e1e38;
  --text:#e2e2f0;
  --muted:#44446a;
  --faint:#1c1c30;
  --green:#00ff87;
  --green2:#00cc6a;
  --red:#ff3860;
  --blue:#4f8fff;
  --yellow:#ffd166;
  --purple:#9f7aea;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'IBM Plex Mono',monospace;overflow:hidden}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ── Layout ── */
.shell{display:flex;flex-direction:column;height:100vh}
.hdr{height:52px;flex-shrink:0;background:var(--bg1);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px}
.body{flex:1;display:flex;overflow:hidden}
.sidebar{width:180px;flex-shrink:0;background:var(--bg1);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.detail{width:320px;flex-shrink:0;background:var(--bg1);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;transition:width .2s}
.detail.hidden{width:0;border:none}
.ticker{height:34px;flex-shrink:0;background:var(--bg1);border-top:1px solid var(--border);overflow:hidden;display:flex;align-items:center}

/* ── Logo ── */
.logo{display:flex;align-items:center;gap:8px;flex-shrink:0}
.logo-mark{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--green),var(--blue));display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.logo-name{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;color:#fff;letter-spacing:-.5px}
.logo-tag{font-size:9px;color:var(--muted);letter-spacing:1.5px}

/* ── Header stats ── */
.hstat{padding:4px 12px;border:1px solid var(--border);border-radius:6px;text-align:center;flex-shrink:0}
.hstat-l{font-size:7px;color:var(--muted);letter-spacing:1.5px;display:block;margin-bottom:2px}
.hstat-v{font-size:15px;font-weight:700;line-height:1}
.live-badge{display:flex;align-items:center;gap:5px;padding:4px 10px;border:1px solid rgba(0,255,135,.2);border-radius:99px;background:rgba(0,255,135,.05)}
.dot{width:5px;height:5px;border-radius:50%;background:var(--green)}
.dot.pulse{animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.refresh-btn{padding:5px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:11px;cursor:pointer;transition:all .15s}
.refresh-btn:hover{color:var(--text);border-color:var(--border2)}

/* ── Sidebar ── */
.sb-label{font-size:8px;color:var(--muted);letter-spacing:2px;padding:12px 14px 6px;text-transform:uppercase}
.sb-btn{display:flex;align-items:center;gap:8px;padding:8px 14px;cursor:pointer;font-size:12px;color:var(--muted);border:none;background:transparent;width:100%;text-align:left;font-family:'IBM Plex Mono',monospace;transition:all .12s;border-left:2px solid transparent}
.sb-btn:hover{color:var(--text);background:var(--bg2)}
.sb-btn.on{color:var(--text);background:var(--bg2);border-left-color:var(--green)}
.sb-cat-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sb-divider{height:1px;background:var(--border);margin:8px 0}
.sb-ev-badge{margin-left:auto;font-size:9px;padding:1px 6px;border-radius:4px}

/* ── Toolbar ── */
.toolbar{height:40px;flex-shrink:0;background:var(--bg1);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 12px;gap:8px}
.sort-hdr{font-size:9px;color:var(--muted);cursor:pointer;transition:color .12s;letter-spacing:.5px;display:flex;align-items:center;gap:3px;padding:3px 6px;border-radius:4px;border:none;background:transparent;font-family:'IBM Plex Mono',monospace}
.sort-hdr:hover{color:var(--text)}
.sort-hdr.on{color:var(--green)}
.flt-btn{padding:4px 10px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:10px;cursor:pointer;transition:all .12s}
.flt-btn.on{border-color:rgba(0,255,135,.4);background:rgba(0,255,135,.07);color:var(--green)}

/* ── Table ── */
.table-wrap{flex:1;overflow-y:auto}
table{width:100%;border-collapse:collapse}
thead th{position:sticky;top:0;background:var(--bg1);padding:8px 12px;font-size:9px;color:var(--muted);letter-spacing:1px;font-weight:600;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;z-index:10}
thead th:not(:first-child){text-align:right}
.th-btn{background:none;border:none;color:inherit;cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:1px;font-weight:600;display:flex;align-items:center;gap:3px;margin-left:auto;padding:0}
.th-btn.on{color:var(--green)}
tbody tr{border-bottom:1px solid var(--faint);cursor:pointer;transition:background .1s}
tbody tr:hover{background:var(--bg2)}
tbody tr.sel{background:rgba(0,255,135,.04);border-left:2px solid var(--green)}
td{padding:10px 12px;font-size:12px;white-space:nowrap}
td:not(:first-child){text-align:right}

/* ── EV chips ── */
.chip-pos{color:var(--green);font-weight:700}
.chip-neg{color:var(--red);font-weight:700}
.ev-pill{padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700;display:inline-block}
.ev-pill.pos{background:rgba(0,255,135,.12);color:var(--green);border:1px solid rgba(0,255,135,.25)}
.ev-pill.neg{background:rgba(255,56,96,.1);color:var(--red);border:1px solid rgba(255,56,96,.2)}
.ev-pill.neutral{background:rgba(79,143,255,.1);color:var(--blue);border:1px solid rgba(79,143,255,.2)}

/* ── Mini bar ── */
.mbar{display:inline-flex;align-items:center;gap:4px}
.mbar-track{width:40px;height:4px;background:var(--faint);border-radius:2px;position:relative;overflow:hidden}
.mbar-fill{position:absolute;height:100%;border-radius:2px;left:0;top:0}

/* ── Pack name cell ── */
.pack-cell{display:flex;align-items:center;gap:8px}
.pack-img{width:26px;height:36px;object-fit:contain;flex-shrink:0;opacity:.9}
.pack-info{}
.pack-name{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:#fff;line-height:1.2}
.pack-sub{font-size:9px;color:var(--muted);margin-top:1px}
.cat-tag{display:inline-block;padding:1px 5px;border-radius:3px;font-size:8px;font-weight:600;letter-spacing:.5px;margin-left:4px;vertical-align:middle}

/* ── Sparkline ── */
.spark{overflow:visible;display:block}

/* ── Detail panel ── */
.dp-hdr{padding:14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.dp-body{flex:1;overflow-y:auto;padding:14px}
.dp-close{margin-left:auto;background:var(--bg2);border:1px solid var(--border);border-radius:6px;width:26px;height:26px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);font-size:14px;flex-shrink:0}
.dp-close:hover{color:var(--text)}
.dp-section{margin-bottom:16px}
.dp-label{font-size:8px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;display:block}
.dp-big{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;line-height:1}
.dp-sub{font-size:10px;color:var(--muted);margin-top:3px}
.dp-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.dp-stat{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px}
.dp-stat-l{font-size:8px;color:var(--muted);letter-spacing:1.5px;margin-bottom:4px;display:block}
.dp-stat-v{font-size:15px;font-weight:700}
.fee-table{width:100%;border-collapse:collapse}
.fee-table tr{border-bottom:1px solid var(--faint)}
.fee-table tr:last-child{border:none}
.fee-table td{padding:6px 0;font-size:11px}
.fee-table td:last-child{text-align:right}
.fee-table tr.total td{font-weight:700;padding-top:10px;border-top:1px solid var(--border2)}
.pull-item{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--faint)}
.pull-item:last-child{border:none}
.pull-card{font-size:11px;font-weight:600;color:var(--text);max-width:170px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pull-meta{font-size:9px;color:var(--muted);margin-top:2px}
.cta-btn{display:block;text-align:center;padding:11px;border-radius:8px;text-decoration:none;font-family:'Syne',sans-serif;font-weight:700;font-size:13px;margin-top:14px;transition:opacity .15s}
.cta-btn:hover{opacity:.85}

/* ── Ticker ── */
.ticker-inner{display:flex;gap:0;white-space:nowrap;animation:tickerScroll 60s linear infinite}
.ticker-inner:hover{animation-play-state:paused}
@keyframes tickerScroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.tick-item{display:inline-flex;align-items:center;gap:6px;padding:0 18px;border-right:1px solid var(--border);font-size:10px}
.tick-user{color:var(--muted)}
.tick-card{color:var(--text)}

/* ── Feed ── */
.feed-item{display:flex;gap:10px;padding:10px 12px;border-bottom:1px solid var(--faint);align-items:center}
.avatar{width:32px;height:32px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700}

/* ── Loading / Error ── */
.center{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{font-size:30px;animation:spin 1.2s linear infinite;display:inline-block}

/* ── Animations ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .2s ease forwards}

/* ── Unique tag ── */
.utag{font-size:8px;padding:1px 5px;border-radius:3px;background:rgba(79,143,255,.12);border:1px solid rgba(79,143,255,.25);color:var(--blue);letter-spacing:.3px;vertical-align:middle;margin-left:4px}
</style>
</head>
<body>
<div class="shell">

<!-- HEADER -->
<header class="hdr">
  <div class="logo">
    <div class="logo-mark">⚡</div>
    <div>
      <div class="logo-name">EVault</div>
      <div class="logo-tag">COURTYARD EV TRACKER</div>
    </div>
  </div>

  <div style="width:1px;height:28px;background:var(--border);flex-shrink:0"></div>

  <div class="live-badge">
    <div class="dot pulse" id="ldot"></div>
    <span style="font-size:9px;color:var(--green)" id="lstatus">LOADING</span>
    <span style="font-size:9px;color:var(--muted)" id="lcount"></span>
  </div>

  <div class="hdr-right">
    <div class="hstat"><span class="hstat-l">+EV PACKS</span><span class="hstat-v" id="h-pos" style="color:var(--green)">—</span></div>
    <div class="hstat"><span class="hstat-l">BUYBACK +EV</span><span class="hstat-v" id="h-bb" style="color:var(--blue)">—</span></div>
    <div class="hstat"><span class="hstat-l">AVG EV</span><span class="hstat-v" id="h-avg" style="color:var(--text)">—</span></div>
    <div class="hstat"><span class="hstat-l">PULLS</span><span class="hstat-v" id="h-pulls" style="color:var(--muted)">—</span></div>
    <button class="refresh-btn" id="rbtn" onclick="doLoad()">↻ Refresh</button>
  </div>
</header>

<!-- BODY -->
<div class="body">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sb-label">View</div>
    <button class="sb-btn on" id="v-packs" onclick="setView('packs')">📊 All Packs</button>
    <button class="sb-btn" id="v-feed" onclick="setView('feed')">🔴 Live Feed</button>
    <div class="sb-divider"></div>
    <div class="sb-label">Category</div>
    <div id="cat-list"></div>
  </aside>

  <!-- MAIN -->
  <div class="main">

    <!-- TOOLBAR -->
    <div class="toolbar" id="toolbar">
      <div style="display:flex;gap:2px;padding:2px;background:var(--bg2);border-radius:6px;border:1px solid var(--border)">
        <button class="flt-btn on" id="f-all" onclick="setFlt('all')">All</button>
        <button class="flt-btn" id="f-pos" onclick="setFlt('pos')">+EV Only</button>
        <button class="flt-btn" id="f-neg" onclick="setFlt('neg')">−EV Only</button>
      </div>
      <div style="width:1px;height:20px;background:var(--border)"></div>
      <span style="font-size:9px;color:var(--muted)">SORT BY</span>
      <button class="sort-hdr on" id="sb-fmv" onclick="setSort('fmv')">FMV EV ↕</button>
      <button class="sort-hdr" id="sb-bb" onclick="setSort('bb')">BUYBACK ↕</button>
      <button class="sort-hdr" id="sb-wr" onclick="setSort('wr')">WIN RATE ↕</button>
      <button class="sort-hdr" id="sb-price" onclick="setSort('pr')">PRICE ↕</button>
      <button class="sort-hdr" id="sb-pulls" onclick="setSort('n')">PULLS ↕</button>
    </div>

    <!-- TABLE -->
    <div class="table-wrap" id="main-area">
      <div class="center"><span class="spinner">⚡</span><div style="font-family:'Syne',sans-serif;font-size:16px;font-weight:700">Loading live data...</div><div style="font-size:10px;color:var(--muted)">Fetching from Courtyard API</div></div>
    </div>

  </div>

  <!-- DETAIL PANEL -->
  <aside class="detail hidden" id="detail-panel">
    <div id="detail-content"></div>
  </aside>

</div>

<!-- TICKER -->
<div class="ticker">
  <div style="padding:0 12px;font-size:9px;color:var(--muted);letter-spacing:1.5px;flex-shrink:0;border-right:1px solid var(--border);height:100%;display:flex;align-items:center">LIVE</div>
  <div style="flex:1;overflow:hidden;position:relative">
    <div class="ticker-inner" id="ticker-inner"></div>
  </div>
</div>

</div><!-- shell -->

<script>
// ─── CONFIG ─────────────────────────────────────────────────────────────────
const BB = 0.9 * 0.94; // 90% offer × 94% after 6% processing fee
const TRUE_COST_25 = 26.86; // real charged price for $25 packs

const CAT = {
  'Pokémon':    { color:'#f6c90e', emoji:'⚡' },
  'Baseball':   { color:'#e85d04', emoji:'⚾' },
  'Basketball': { color:'#f77f00', emoji:'🏀' },
  'Hockey':     { color:'#4cc9f0', emoji:'🏒' },
  'Football':   { color:'#80b918', emoji:'🏈' },
  'Soccer':     { color:'#2dc653', emoji:'⚽' },
  'Sports':     { color:'#ff6b6b', emoji:'🏆' },
  'Magic':      { color:'#9f7aea', emoji:'🔮' },
  'Comics':     { color:'#ff4081', emoji:'📚' },
  'Watch':      { color:'#78909c', emoji:'⌚' },
};

const PCFG = {
  'pkmn-basic-pack':         {name:'Pokémon Basic',        price:10,  cat:'Pokémon'},
  'pkmn-starter-pack':       {name:'Pokémon Starter',      price:25,  cat:'Pokémon'},
  'pkmn-pro-pack':           {name:'Pokémon Pro',          price:50,  cat:'Pokémon'},
  'pkmn-master-pack':        {name:'Pokémon Master',       price:100, cat:'Pokémon'},
  'pkmn-diamond-pack':       {name:'Pokémon Diamond',      price:500, cat:'Pokémon'},
  'baseball-starter-pack':   {name:'Baseball Starter',     price:25,  cat:'Baseball'},
  'baseball-pro-pack':       {name:'Baseball Pro',         price:50,  cat:'Baseball'},
  'baseball-master-pack':    {name:'Baseball Master',      price:100, cat:'Baseball'},
  'basketball-starter-pack': {name:'Basketball Starter',   price:25,  cat:'Basketball'},
  'basketball-pro-pack':     {name:'Basketball Pro',       price:50,  cat:'Basketball'},
  'basketball-master-pack':  {name:'Basketball Master',    price:100, cat:'Basketball'},
  'hockey-starter-pack':     {name:'Hockey Starter',       price:25,  cat:'Hockey'},
  'hockey-pro-pack':         {name:'Hockey Pro',           price:50,  cat:'Hockey'},
  'hockey-master-pack':      {name:'Hockey Master',        price:100, cat:'Hockey'},
  'football-starter-pack':   {name:'Football Starter',     price:25,  cat:'Football'},
  'football-pro-pack':       {name:'Football Pro',         price:50,  cat:'Football'},
  'football-master-pack':    {name:'Football Master',      price:100, cat:'Football'},
  'soccer-starter-pack':     {name:'Soccer Starter',       price:25,  cat:'Soccer'},
  'soccer-pro-pack':         {name:'Soccer Pro',           price:50,  cat:'Soccer'},
  'sports-legend-pack':      {name:'Sports Legend',        price:100, cat:'Sports'},
  'magic-booster-pack':      {name:'Magic: The Gathering', price:10,  cat:'Magic'},
  'cgc-comics-pack':         {name:'CGC Comics',           price:200, cat:'Comics'},
  'premier-watch-box':       {name:'Premier Watch Box',    price:500, cat:'Watch'},
};

const EMAP = {
  'Pokémon Basic Pack':'pkmn-basic-pack','Pokémon Basic':'pkmn-basic-pack',
  'Pokémon Starter Pack':'pkmn-starter-pack','Pokémon Starter':'pkmn-starter-pack',
  'Pokémon Pro Pack':'pkmn-pro-pack','Pokémon Pro':'pkmn-pro-pack',
  'Pokémon Master Pack':'pkmn-master-pack','Pokémon Master':'pkmn-master-pack',
  'Pokémon Diamond Pack':'pkmn-diamond-pack','Pokémon Diamond':'pkmn-diamond-pack',
  'Baseball Starter Pack':'baseball-starter-pack','Baseball Starter':'baseball-starter-pack',
  'Baseball Pro Pack':'baseball-pro-pack','Baseball Pro':'baseball-pro-pack',
  'Baseball Master Pack':'baseball-master-pack','Baseball Master':'baseball-master-pack',
  'Basketball Starter Pack':'basketball-starter-pack','Basketball Starter':'basketball-starter-pack',
  'Basketball Pro Pack':'basketball-pro-pack','Basketball Pro':'basketball-pro-pack',
  'Basketball Master Pack':'basketball-master-pack','Basketball Master':'basketball-master-pack',
  'Hockey Starter Pack':'hockey-starter-pack','Hockey Starter':'hockey-starter-pack',
  'Hockey Pro Pack':'hockey-pro-pack','Hockey Pro':'hockey-pro-pack',
  'Hockey Master Pack':'hockey-master-pack','Hockey Master':'hockey-master-pack',
  'Football Starter Pack':'football-starter-pack','Football Starter':'football-starter-pack',
  'Football Pro Pack':'football-pro-pack','Football Pro':'football-pro-pack',
  'Football Master Pack':'football-master-pack','Football Master':'football-master-pack',
  'Soccer Starter Pack':'soccer-starter-pack','Soccer Starter':'soccer-starter-pack',
  'Soccer Pro Pack':'soccer-pro-pack','Soccer Pro':'soccer-pro-pack',
  'Sports Legend Pack':'sports-legend-pack','Sports Legend':'sports-legend-pack',
  'Sealed Magic: The Gathering Booster':'magic-booster-pack','Magic: The Gathering':'magic-booster-pack',
  'CGC Comics':'cgc-comics-pack','Premier Watch Box':'premier-watch-box',
};

function getPid(a){
  const ev=a.attributes?.find(x=>x.name==='Event')?.value||'';
  if(EMAP[ev]) return EMAP[ev];
  const lo=ev.toLowerCase();
  for(const [k,v] of Object.entries(EMAP)) if(lo.includes(k.toLowerCase())) return v;
  return null;
}

// ─── STATE ──────────────────────────────────────────────────────────────────
const S={view:'packs',cat:'All',sort:'fmv',flt:'all',sel:null,packs:[],feed:[],raw:0};

// ─── UTILS ──────────────────────────────────────────────────────────────────
const $f = n=>'$'+(+n).toFixed(2);
const $p = n=>((+n)*100).toFixed(1)+'%';
const ago = ts=>{const s=Math.floor((Date.now()-new Date(ts))/1000);return s<60?s+'s':s<3600?Math.floor(s/60)+'m':Math.floor(s/3600)+'h'};

function spk(vals,color,W,H){
  if(!vals||vals.length<2) return '';
  const mn=Math.min(...vals),mx=Math.max(...vals),r=mx-mn||1;
  const pts=vals.map((v,i)=>`${Math.round(i/(vals.length-1)*W)},${Math.round(H-((v-mn)/r)*(H-4)-2)}`).join(' ');
  const ly=Math.round(H-((vals[vals.length-1]-mn)/r)*(H-4)-2);
  return `<svg class="spark" width="${W}" height="${H}"><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/><circle cx="${W}" cy="${ly}" r="2.5" fill="${color}"/></svg>`;
}

function pct(ratio){
  const p=ratio>=1;
  const w=Math.min(Math.abs(ratio-1)/0.5*100,100);
  return `<div class="mbar"><div class="mbar-track"><div class="mbar-fill" style="width:${w}%;background:${p?'var(--green)':'var(--red)'}"></div></div></div>`;
}

// ─── DATA ───────────────────────────────────────────────────────────────────
function buildPacks(assets){
  const m={};
  for(const a of assets){
    const id=getPid(a); if(!id||!PCFG[id]) continue;
    const fmv=a.fmv_estimate_usd||0; if(!fmv) continue;
    if(!m[id]) m[id]={fmvs:[],raw:[]};
    m[id].fmvs.push(fmv); m[id].raw.push(a);
  }
  return Object.entries(m).map(([id,d])=>{
    const cfg=PCFG[id],n=d.fmvs.length;
    const avg=d.fmvs.reduce((a,b)=>a+b,0)/n;
    const bb=avg*BB;
    const fmvR=avg/cfg.price, bbR=bb/cfg.price;
    const pulls=d.raw.slice(0,6).map(a=>({
      card:a.attributes?.find(x=>x.name==='Title/Subject')?.value||'—',
      grader:a.attributes?.find(x=>x.name==='Grader')?.value||'',
      grade:a.attributes?.find(x=>x.name==='Grade')?.value||'',
      fmv:a.fmv_estimate_usd||0, user:a.owner?.username||'anon', time:a.tx_time
    }));
    return{...cfg,id,avg,bb,fmvR,bbR,
      posEV:fmvR>=1,posBB:bbR>=1,
      best:Math.max(...d.fmvs),worst:Math.min(...d.fmvs),
      wr:d.fmvs.filter(v=>v>cfg.price).length/n,
      n,hist:d.fmvs.slice(-16),pulls,
      img:`https://api.courtyard.io/configs/vending-machine/${id}/resources/sealed_pack.png`
    };
  }).sort((a,b)=>b.fmvR-a.fmvR);
}

function buildFeed(assets){
  return assets.slice(0,60).map(a=>{
    const id=getPid(a),cfg=PCFG[id]||{name:'Unknown',price:0,cat:''};
    return{user:a.owner?.username||'anon',pack:cfg.name,cat:cfg.cat,
      card:a.attributes?.find(x=>x.name==='Title/Subject')?.value||'—',
      grader:a.attributes?.find(x=>x.name==='Grader')?.value||'',
      grade:a.attributes?.find(x=>x.name==='Grade')?.value||'',
      fmv:a.fmv_estimate_usd||0,price:cfg.price,time:a.tx_time};
  });
}

// ─── FETCH ──────────────────────────────────────────────────────────────────
let cdVal=300;
async function doLoad(){
  const btn=document.getElementById('rbtn');
  btn.textContent='↺ Loading...'; btn.disabled=true;
  document.getElementById('lstatus').textContent='LOADING';
  document.getElementById('ldot').classList.remove('pulse');
  try{
    const res=await fetch('/api/pulls');
    if(!res.ok) throw new Error('API '+res.status);
    const d=await res.json();
    const assets=d.assets||[];
    if(!assets.length) throw new Error('No data');
    S.packs=buildPacks(assets);
    S.feed=buildFeed(assets);
    S.raw=assets.length;
    // Header
    document.getElementById('h-pos').textContent=S.packs.filter(p=>p.posEV).length;
    document.getElementById('h-bb').textContent=S.packs.filter(p=>p.posBB).length;
    const avgEV=S.packs.reduce((a,b)=>a+b.fmvR,0)/S.packs.length;
    document.getElementById('h-avg').textContent=$p(avgEV);
    document.getElementById('h-pulls').textContent=assets.length;
    document.getElementById('lstatus').textContent='LIVE';
    document.getElementById('ldot').classList.add('pulse');
    cdVal=300;
    btn.textContent='↻ Refresh'; btn.disabled=false;
    buildSidebar();
    buildTicker();
    render();
  }catch(e){
    document.getElementById('lstatus').textContent='ERROR';
    btn.textContent='↻ Retry'; btn.disabled=false;
    document.getElementById('main-area').innerHTML=`
      <div class="center">
        <div style="font-size:28px">⚠️</div>
        <div style="font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:var(--red)">Could not load data</div>
        <div style="font-size:10px;color:var(--muted);text-align:center;line-height:1.8;max-width:360px">
          ${e.message}<br><br>
          The <code style="color:var(--blue)">/api/pulls.js</code> proxy must be deployed on Vercel alongside index.html.<br>
          Make sure both files are in your GitHub repo.
        </div>
        <button onclick="doLoad()" style="padding:9px 22px;background:var(--green);border:none;border-radius:8px;color:#000;font-family:'Syne',sans-serif;font-weight:700;font-size:13px;cursor:pointer">Retry</button>
      </div>`;
  }
}

// ─── SIDEBAR ────────────────────────────────────────────────────────────────
function buildSidebar(){
  const cats=['All',...new Set(S.packs.map(p=>p.cat))];
  const el=document.getElementById('cat-list');
  el.innerHTML=cats.map(c=>{
    const cfg=CAT[c]||{color:'#888',emoji:'📦'};
    const packs=c==='All'?S.packs:S.packs.filter(p=>p.cat===c);
    const posN=packs.filter(p=>p.posEV).length;
    const bgCol=c==='All'?'transparent':cfg.color+'18';
    return `<button class="sb-btn${S.cat===c?' on':''}" id="cat-${c.replace(/[^a-z]/gi,'_')}" onclick="setCat('${c}')" style="${S.cat===c?`border-left-color:${c==='All'?'var(--green)':cfg.color}`:''}">
      <span style="width:8px;height:8px;border-radius:50%;background:${c==='All'?'var(--green)':cfg.color};flex-shrink:0;display:inline-block"></span>
      <span style="flex:1">${c}</span>
      ${posN>0?`<span class="sb-ev-badge" style="background:rgba(0,255,135,.1);color:var(--green)">${posN}+</span>`:''}
    </button>`;
  }).join('');
}

// ─── TICKER ─────────────────────────────────────────────────────────────────
function buildTicker(){
  if(!S.feed.length) return;
  const items=S.feed.slice(0,20).map(r=>{
    const win=r.fmv>r.price;
    const col=win?'var(--green)':'var(--red)';
    return `<div class="tick-item">
      <span class="tick-user">@${r.user}</span>
      <span class="tick-card">${r.card.slice(0,28)}</span>
      <span style="color:${col};font-weight:700">${$f(r.fmv)}</span>
      <span style="color:${win?'rgba(0,255,135,.5)':'rgba(255,56,96,.5)'}">${win?'+':''}${$f(r.fmv-r.price)}</span>
    </div>`;
  }).join('');
  const inner=document.getElementById('ticker-inner');
  inner.innerHTML=items+items; // duplicate for seamless loop
}

// ─── RENDER ─────────────────────────────────────────────────────────────────
function render(){
  document.getElementById('toolbar').style.display=S.view==='packs'?'flex':'none';
  if(S.view==='packs') renderTable();
  else renderFeed();
}

// ── TABLE ──
function renderTable(){
  const rows=[...S.packs]
    .filter(p=>S.cat==='All'||p.cat===S.cat)
    .filter(p=>S.flt==='pos'?p.posEV:S.flt==='neg'?!p.posEV:true)
    .sort((a,b)=>
      S.sort==='fmv'?b.fmvR-a.fmvR:
      S.sort==='bb'?b.bbR-a.bbR:
      S.sort==='wr'?b.wr-a.wr:
      S.sort==='pr'?a.price-b.price:
      b.n-a.n);

  if(!rows.length){
    document.getElementById('main-area').innerHTML=`<div class="center"><div style="color:var(--muted);font-size:11px">No packs match this filter</div></div>`;
    return;
  }

  const html=`<table>
    <thead>
      <tr>
        <th style="width:240px">PACK</th>
        <th><button class="th-btn${S.sort==='pr'?' on':''}" onclick="setSort('pr')">PRICE ↕</button></th>
        <th><button class="th-btn${S.sort==='fmv'?' on':''}" onclick="setSort('fmv')">FMV EV ↕</button></th>
        <th><button class="th-btn${S.sort==='bb'?' on':''}" onclick="setSort('bb')">BUYBACK EV <span class="utag">REAL CASH</span> ↕</button></th>
        <th><button class="th-btn${S.sort==='wr'?' on':''}" onclick="setSort('wr')">WIN RATE ↕</button></th>
        <th>AVG FMV</th>
        <th>CASH OUT</th>
        <th>BEST PULL</th>
        <th><button class="th-btn${S.sort==='n'?' on':''}" onclick="setSort('n')">PULLS ↕</button></th>
        <th>TREND</th>
      </tr>
    </thead>
    <tbody>
      ${rows.map(p=>{
        const c=p.posEV?'var(--green)':'var(--red)';
        const catCfg=CAT[p.cat]||{color:'#888'};
        const sel=S.sel===p.id;
        return `<tr class="${sel?'sel':''} fade-up" onclick="openDetail('${p.id}')">
          <td>
            <div class="pack-cell">
              <div style="width:4px;align-self:stretch;background:${catCfg.color};border-radius:2px;flex-shrink:0"></div>
              <img class="pack-img" src="${p.img}" onerror="this.style.display='none'"/>
              <div class="pack-info">
                <div class="pack-name">${p.name}</div>
                <div class="pack-sub">${p.cat} · ${$f(p.price)}/pack</div>
              </div>
            </div>
          </td>
          <td style="color:var(--muted)">${$f(p.price)}</td>
          <td>
            <span class="ev-pill ${p.posEV?'pos':'neg'}">${p.posEV?'+':''}${$p(p.fmvR-1)}</span>
          </td>
          <td>
            <span class="ev-pill ${p.posBB?'neutral':'neg'}">${p.posBB?'+':''}${$p(p.bbR-1)}</span>
          </td>
          <td>
            <span style="color:${p.wr>=.5?'var(--green)':'var(--muted)'};font-weight:${p.wr>=.5?700:400}">${$p(p.wr)}</span>
          </td>
          <td style="color:${c};font-weight:600">${$f(p.avg)}</td>
          <td style="color:${p.posBB?'var(--blue)':'var(--red)'};font-weight:600">${$f(p.bb)}</td>
          <td style="color:var(--green)">${$f(p.best)}</td>
          <td style="color:var(--muted)">${p.n}</td>
          <td>${spk([...p.hist].reverse(),c,72,24)}</td>
        </tr>`;
      }).join('')}
    </tbody>
  </table>`;

  document.getElementById('main-area').innerHTML=html;
}

// ── DETAIL ──

  S.sel=id;
  const p=S.packs.find(x=>x.id===id);

  const panel=document.getElementById('detail-panel');

  const c=p.posEV?'var(--green)':'var(--red)';
  const catCfg=CAT[p.cat]||{color:'#888'};

  document.getElementById('detail-content').innerHTML=`
    <div class="dp-hdr">
      <img src="${p.img}" style="width:32px;height:44px;object-fit:contain" onerror="this.style.display='none'"/>
      <div>
        <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:16px;color:#fff">${p.name}</div>
        <div style="font-size:9px;color:var(--muted);margin-top:2px">${p.cat} · ${$f(p.price)}/pack · ${p.n} pulls</div>
      </div>
      <div class="dp-close" onclick="closeDetail()">✕</div>
    </div>
    <div class="dp-body">

      <div class="dp-section">
        <span class="dp-label">Expected Value</span>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
          <div class="dp-stat" style="border-color:${p.posEV?'rgba(0,255,135,.25)':'rgba(255,56,96,.2)'}">
            <span class="dp-stat-l">FMV EV</span>
            <div class="dp-stat-v" style="color:${c}">${$p(p.fmvR)}</div>
            <div style="font-size:9px;color:var(--muted);margin-top:2px">${p.posEV?'+':'-'}${$f(Math.abs(p.avg-p.price))} avg</div>
          </div>
          <div class="dp-stat" style="border-color:${p.posBB?'rgba(79,143,255,.25)':'rgba(255,56,96,.2)'}">
            <span class="dp-stat-l">BUYBACK EV <span class="utag">UNIQUE</span></span>
            <div class="dp-stat-v" style="color:${p.posBB?'var(--blue)':'var(--red)'}">${$p(p.bbR)}</div>
            <div style="font-size:9px;color:var(--muted);margin-top:2px">≈${$f(p.bb)} cash</div>
          </div>
        </div>
      </div>

      <div class="dp-section">
        <span class="dp-label">Pack Stats</span>
        <div class="dp-grid">
          <div class="dp-stat"><span class="dp-stat-l">WIN RATE</span><div class="dp-stat-v" style="color:${p.wr>=.5?'var(--green)':'var(--muted)'}">${$p(p.wr)}</div></div>
          <div class="dp-stat"><span class="dp-stat-l">BEST PULL</span><div class="dp-stat-v" style="color:var(--green)">${$f(p.best)}</div></div>
          <div class="dp-stat"><span class="dp-stat-l">AVG FMV</span><div class="dp-stat-v" style="color:${c}">${$f(p.avg)}</div></div>
          <div class="dp-stat"><span class="dp-stat-l">WORST PULL</span><div class="dp-stat-v" style="color:var(--red)">${$f(p.worst)}</div></div>
        </div>
      </div>

      <div class="dp-section">
        <span class="dp-label">💡 Real Fee Breakdown <span class="utag">NOT ON PULLD</span></span>
        <table class="fee-table">
          <tr><td style="color:var(--muted)">Pack price (advertised)</td><td>$25.00</td></tr>
          <tr><td style="color:var(--muted)">Actual charged (+7.4%)</td><td style="color:var(--red)">$26.86</td></tr>
          <tr><td style="color:var(--muted)">Avg card FMV</td><td style="color:${c}">${$f(p.avg)}</td></tr>
          <tr><td style="color:var(--muted)">Courtyard offer (×0.90)</td><td>${$f(p.avg*.9)}</td></tr>
          <tr class="total"><td style="color:var(--text)">Cash in hand (×0.94)</td><td style="color:${p.posBB?'var(--green)':'var(--red)'};font-size:15px">${$f(p.bb)}</td></tr>
        </table>
      </div>

      <div class="dp-section">
        <span class="dp-label">Recent Pulls</span>
        ${p.pulls.map(r=>{
          const win=r.fmv>p.price;
          return `<div class="pull-item">
            <div>
              <div class="pull-card">${r.card}</div>
              <div class="pull-meta">${[r.grader,r.grade].filter(Boolean).join(' ')} · @${r.user} · ${ago(r.time)}</div>
            </div>
            <div style="text-align:right;flex-shrink:0;margin-left:10px">
              <div style="font-weight:700;font-size:12px;color:${win?'var(--green)':'var(--muted)'}">${$f(r.fmv)}</div>
              <div style="font-size:9px;color:${win?'rgba(0,255,135,.5)':'rgba(255,56,96,.4)'}">${win?'+':''}${$f(r.fmv-p.price)}</div>
            </div>

        }).join('')}
      </div>

        ${p.posEV?'✓ Buy on Courtyard →':'View on Courtyard →'}
      </a>
    </div>`;

  // highlight row
  renderTable();
}

function closeDetail(){
  S.sel=null;
  document.getElementById('detail-panel').classList.add('hidden');
  renderTable();
}

// ── FEED ──

  if(!S.feed.length){
    document.getElementById('main-area').innerHTML=`<div class="center"><div style="color:var(--muted);font-size:11px">No feed data</div></div>`;
    return;
  }
  const rows=S.feed.filter(r=>S.cat==='All'||r.cat===S.cat);
  document.getElementById('main-area').innerHTML=`
    <div style="padding:10px 12px;font-size:8px;color:var(--muted);letter-spacing:2px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px">
      <span style="width:5px;height:5px;border-radius:50%;background:var(--green);display:inline-block;animation:blink 2s infinite"></span>
      LIVE PULL FEED · ${rows.length} PULLS
    </div>
    ${rows.map(r=>{
      const win=r.fmv>r.price;
      const hue=((r.user||'x').charCodeAt(0)*23)%360;
      const grade=[r.grader,r.grade].filter(Boolean).join(' ');

        </div>

          <div style="font-weight:700;font-size:15px;color:${win?'var(--green)':'var(--muted)'}">${$f(r.fmv)}</div>
          <div style="font-size:10px;color:${win?'rgba(0,255,135,.5)':'rgba(255,56,96,.4)'}">${win?'+':''}${$f(r.fmv-r.price)}</div>
        </div>
      </div>`;
    }).join('')}`;
}

// ─── CONTROLS ───────────────────────────────────────────────────────────────
function setView(v){
  S.view=v; S.sel=null;
  document.getElementById('detail-panel').classList.add('hidden');
  ['packs','feed'].forEach(id=>{
    const el=document.getElementById('v-'+id);
    if(el) el.classList.toggle('on',id===v);
  });
  render();
}
function setCat(c){S.cat=c;buildSidebar();render();}
function setFlt(f){
  S.flt=f;
  ['all','pos','neg'].forEach(id=>document.getElementById('f-'+id)?.classList.toggle('on',id===f));
  render();
}
function setSort(s){
  S.sort=s;
  ['fmv','bb','wr','pr','n'].forEach(id=>{
    const el=document.getElementById('sb-'+id)||document.getElementById('sb-pulls');
    if(el) el.classList.toggle('on',id===s);
  });
  render();
}

// ─── INIT ───────────────────────────────────────────────────────────────────
doLoad();
setInterval(doLoad,5*60*1000);
setInterval(()=>{
  cdVal=Math.max(0,cdVal-1);
  const el=document.getElementById('lcount');
  if(el) el.textContent=` · ${cdVal}s`;
  if(cdVal===0){doLoad();cdVal=300;}
},1000);
</script>
